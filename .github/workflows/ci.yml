name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dotnet:
    name: Build .NET app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/A2aDemo/A2aDemo.csproj

      - name: Install dotnet-format
        run: |
          dotnet tool install -g dotnet-format
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Verify formatting
        run: dotnet format src/A2aDemo/A2aDemo.csproj --verify-no-changes --no-restore
      - name: Build
        run: dotnet build src/A2aDemo/A2aDemo.csproj --configuration Release --no-restore

  bicep:
    name: Validate Bicep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/download/v0.44.1/bicep-linux-x64
          chmod +x ./bicep
          sudo mv ./bicep /usr/local/bin/bicep
          bicep --version

      - name: Build Bicep (lint)
        run: |
          bicep build infra/main.bicep --stdout > /dev/null
          bicep build infra/resources.bicep --stdout > /dev/null
