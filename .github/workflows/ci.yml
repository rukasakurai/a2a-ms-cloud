name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dotnet:
    name: Build .NET app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/A2aDemo/A2aDemo.csproj

      - name: Verify formatting
        run: dotnet format src/A2aDemo/A2aDemo.csproj --verify-no-changes --no-restore

      - name: Build
        run: dotnet build src/A2aDemo/A2aDemo.csproj --configuration Release --no-restore

  bicep:
    name: Validate Bicep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: az bicep install

      - name: Build Bicep (lint)
        run: |
          az bicep build --file infra/main.bicep --stdout > /dev/null
          az bicep build --file infra/resources.bicep --stdout > /dev/null
